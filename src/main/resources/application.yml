server:
  port: 8080

spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
            allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
            allowed-headers: '*'
            allow-credentials: true
      routes:
        - id: users-auth
          uri: ${USERS_SERVICE_URL:http://service-users:8081}
          predicates:
            - Path=/api/v1/auth/**

        - id: users-service
          uri: ${USERS_SERVICE_URL:http://service-users:8081}
          predicates:
            - Path=/api/v1/users/**

        - id: finances-service
          uri: ${FINANCES_SERVICE_URL:http://service-finances:8082}
          predicates:
            - Path=/api/v1/finances/**

        - id: cards-service
          uri: ${CARDS_SERVICE_URL:http://service-cards:8083}
          predicates:
            - Path=/api/v1/cards/**

        - id: notifications-service
          uri: ${NOTIFICATIONS_SERVICE_URL:http://service-notifications:8084}
          predicates:
            - Path=/api/v1/notifications/**

        - id: upload-service
          uri: ${UPLOAD_SERVICE_URL:http://service-upload:8085}
          predicates:
            - Path=/api/v1/upload/**

jwt:
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Users Service
        url: ${USERS_SERVICE_URL:http://service-users:8081}/v3/api-docs
      - name: Finances Service
        url: ${FINANCES_SERVICE_URL:http://service-finances:8082}/v3/api-docs
      - name: Cards Service
        url: ${CARDS_SERVICE_URL:http://service-cards:8083}/v3/api-docs
      - name: Notifications Service
        url: ${NOTIFICATIONS_SERVICE_URL:http://service-notifications:8084}/v3/api-docs
      - name: Upload Service
        url: ${UPLOAD_SERVICE_URL:http://service-upload:8085}/v3/api-docs
  api-docs:
    path: /v3/api-docs
