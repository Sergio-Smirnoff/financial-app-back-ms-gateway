server:
  port: 8080

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      routes:
        # ── Business routes ──────────────────────────────────────────────────
        - id: users-auth
          uri: ${USERS_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**

        - id: users-service
          uri: ${USERS_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**

        - id: finances-service
          uri: ${FINANCES_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/finances/**

        - id: banks-service
          uri: ${BANKS_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/banks/**

        - id: notifications-sse
          uri: ${NOTIFICATIONS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/notifications/stream
          metadata:
            response-timeout: -1

        - id: notifications-service
          uri: ${NOTIFICATIONS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/notifications/**

        - id: upload-service
          uri: ${UPLOAD_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/upload/**

        - id: investments-service
          uri: ${INVESTMENTS_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/investments/**

        # ── API-docs proxy routes (so browser can reach them via localhost:8080)
        - id: users-api-docs
          uri: ${USERS_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/v3/api-docs/users
          filters:
            - RewritePath=/v3/api-docs/users, /v3/api-docs

        - id: finances-api-docs
          uri: ${FINANCES_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/v3/api-docs/finances
          filters:
            - RewritePath=/v3/api-docs/finances, /v3/api-docs

        - id: banks-api-docs
          uri: ${BANKS_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/v3/api-docs/banks
          filters:
            - RewritePath=/v3/api-docs/banks, /v3/api-docs

        - id: notifications-api-docs
          uri: ${NOTIFICATIONS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/v3/api-docs/notifications
          filters:
            - RewritePath=/v3/api-docs/notifications, /v3/api-docs

        - id: upload-api-docs
          uri: ${UPLOAD_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/v3/api-docs/upload
          filters:
            - RewritePath=/v3/api-docs/upload, /v3/api-docs

        - id: investments-api-docs
          uri: ${INVESTMENTS_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/v3/api-docs/investments
          filters:
            - RewritePath=/v3/api-docs/investments, /v3/api-docs

jwt:
  # Set JWT_ENABLED=true only after ms-users (auth service) is implemented
  enabled: ${JWT_ENABLED:true}
  secret: ${JWT_SECRET:dGhpcyBpcyBhIGRldmVsb3BtZW50IHBsYWNlaG9sZGVyIHNlY3JldA==}

rate-limit:
  requests-per-minute: ${RATE_LIMIT_RPM:600}

services:
  finances-url: ${FINANCES_SERVICE_URL:http://localhost:8082}
  banks-url: ${BANKS_SERVICE_URL:http://localhost:8083}
  notifications-url: ${NOTIFICATIONS_SERVICE_URL:http://localhost:8084}
  investments-url: ${INVESTMENTS_SERVICE_URL:http://localhost:8086}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Users Service
        url: /v3/api-docs/users
      - name: Finances Service
        url: /v3/api-docs/finances
      - name: Banks Service
        url: /v3/api-docs/banks
      - name: Notifications Service
        url: /v3/api-docs/notifications
      - name: Upload Service
        url: /v3/api-docs/upload
      - name: Investments Service
        url: /v3/api-docs/investments
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
